<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kausar Private Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #111b21; color: #e9edef; font-family: sans-serif; overflow: hidden; }
        .whatsapp-green { background-color: #00a884; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.06; position: absolute; inset: 0; z-index: 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background-color: #374248; border-radius: 3px; }
    </style>
    <script>
        function goToOtpStageStatic() {
            var num = document.getElementById('phone-number').value.trim();
            if (num.length !== 10 || isNaN(num)) { alert("Enter valid 10-digit number."); return; }
            window.activeUserPhone = "+91" + num;
            document.getElementById('phone-stage').classList.add('hidden');
            document.getElementById('otp-stage').classList.remove('hidden');
        }
        function verifySecretPinStatic() {
            if (document.getElementById('otp-code').value.trim() === "786055") {
                localStorage.setItem('kausar_chat_session', window.activeUserPhone);
                document.getElementById('auth-container').classList.add('hidden');
                if (window.startPrivateSystem) { window.startPrivateSystem(); } else { location.reload(); }
            } else { alert("Incorrect Security PIN."); }
        }
    </script>
</head>
<body class="flex items-center justify-center fixed inset-0">

    <!-- LOGIN BOX -->
    <div id="auth-container" class="w-full max-w-md p-6 bg-[#222e35] rounded-lg shadow-2xl border border-[#374248] z-10 m-4">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-black rounded-full flex items-center justify-center mx-auto mb-3 border border-yellow-600 overflow-hidden">
                <svg viewBox="250 0 500 500" class="w-16 h-16">
                    <path d="M327.9,152.4 c1.9,4,6.7,5.6,10.6,3.6 c3.9-1.9,5.5-6.7,3.6-10.6 c-1.9-4-6.7-5.6-10.6-3.6 C327.6,143.7,326,148.5,327.9,152.4z M375,123.6 c4.4,0,8-3.6,8-8 s-3.6-8-8-8 c-4.4,0-8,3.6-8,8 S370.6,123.6,375,123.6z M422.1,152.4 c1.9,4,6.7,5.6,10.6,3.6 c3.9-1.9,5.5-6.7,3.6-10.6 c-1.9-4-6.7-5.6-10.6-3.6 C421.8,143.7,420.2,148.5,422.1,152.4z M453.3,188.7 c3,3.2,8,3.4,11.2,0.4 c3.2-3,3.4-8,0.4-11.2 c-3-3.2-8-3.4-11.2-0.4 C450.5,180.7,450.3,185.6,453.3,188.7z M285.5,177.9 c-3.2,3-3,8,0.4,11.2 c3.2,3,8.1,2.8,11.2-0.4 c3-3.2,2.8-8.1-0.4-11.2 C293.5,174.5,288.6,174.7,285.5,177.9z M438.1,208.5 H311.9 l11.2-41 c16,14.6,33.5,13.7,33.5,13.7 l18.4-44.5 l18.4,44.5 c0,0,17.5,0.9,33.5-13.7 L438.1,208.5 z" fill="#cda250"/>
                    <path d="M346.8,217.1 v148.7 h23.8 V299.4 l42.8,66.4 h28.2 l-50.6-76.4 l46.8-72.3 h-27.4 l-40,63.1 V217.1 H346.8 z" fill="#cda250"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Kausar Private Hub</h2>
            <p class="text-sm text-[#8696a0] mt-1">Private Encrypted Chat System</p>
        </div>
        <div id="phone-stage">
            <label class="block text-xs font-semibold text-[#00a884] mb-2 uppercase">Your Phone Number</label>
            <div class="flex gap-2 mb-4">
                <span class="bg-[#2a3942] border border-[#374248] text-white px-3 py-3 rounded flex items-center">+91</span>
                <input type="tel" id="phone-number" placeholder="Enter 10 digits" class="w-full bg-[#2a3942] border border-[#374248] text-white px-4 py-3 rounded focus:outline-none focus:border-[#00a884]">
            </div>
            <button onclick="goToOtpStageStatic()" class="w-full whatsapp-green hover:bg-[#008f72] text-[#111b21] font-bold py-3 px-4 rounded transition">
                Next <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </div>
        <div id="otp-stage" class="hidden">
            <label class="block text-xs font-semibold text-[#00a884] mb-2 uppercase">6-Digit Security PIN</label>
            <input type="password" id="otp-code" placeholder="Enter PIN" maxlength="6" class="w-full bg-[#2a3942] border border-[#374248] text-white px-4 py-3 rounded text-center tracking-widest focus:outline-none focus:border-[#00a884] mb-4">
            <button onclick="verifySecretPinStatic()" class="w-full whatsapp-green hover:bg-[#008f72] text-[#111b21] font-bold py-3 px-4 rounded transition">
                Verify & Login <i class="fa-solid fa-circle-check ml-1"></i>
            </button>
        </div>
    </div>

    <!-- MAIN CHAT SCREEN -->
    <div id="chat-container" class="hidden w-full h-full flex z-10 overflow-hidden">
        <!-- Sidebar Contacts -->
        <div id="sidebar-panel" class="w-full md:w-[35%] bg-[#111b21] border-r border-[#222e35] flex flex-col h-full z-20">
            <div class="bg-[#202c33] h-[60px] p-4 flex items-center justify-between shadow-sm flex-shrink-0">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-full bg-[#00a884] text-[#111b21] font-bold flex items-center justify-center text-lg uppercase" id="user-avatar">K</div>
                    <span class="font-bold text-sm text-white" id="user-phone">Loading...</span>
                </div>
                <button id="btn-logout" class="text-[#8696a0] hover:text-red-500 text-lg p-2"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
            <div class="p-3 bg-[#111b21] text-xs font-bold text-[#00a884] uppercase tracking-wide">Secure Contacts</div>
            <div id="users-list-box" class="flex-1 overflow-y-auto divide-y divide-[#222e35]"></div>
        </div>

        <!-- Chat Panel -->
        <div id="chat-panel" class="hidden md:flex flex-1 flex-col h-full bg-[#222e35] relative z-10 overflow-hidden">
            <div class="chat-bg"></div>
            <div class="bg-[#202c33] h-[60px] p-4 flex items-center justify-between border-b border-[#222e35] z-10 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <button id="btn-close-chat" class="md:hidden text-[#8696a0] hover:text-white mr-1 text-lg"><i class="fa-solid fa-arrow-left"></i></button>
                    <div class="w-10 h-10 bg-[#00a884] text-black font-bold rounded-full flex items-center justify-center text-base uppercase" id="active-chat-avatar">?</div>
                    <h3 class="font-semibold text-white text-base" id="active-chat-title">Select Chat</h3>
                </div>
            </div>
            <div id="messages-box" class="flex-1 overflow-y-auto p-4 space-y-3 z-10 flex flex-col">
                <div class="m-auto text-center max-w-xs bg-[#202c33] p-4 rounded-xl border border-[#374248]">
                    <p class="text-sm text-gray-300">Select a secure contact from sidebar to start chat stream.</p>
                </div>
            </div>
            <div id="input-bar-container" class="hidden bg-[#202c33] p-3 items-center gap-2 border-t border-[#222e35] z-10 w-full flex-shrink-0">
                <input type="text" id="message-field" placeholder="Type a private message..." autocomplete="off" class="flex-1 bg-[#2a3942] text-white text-base px-4 py-2.5 rounded-lg border border-[#374248] focus:outline-none focus:border-[#00a884]">
                <button id="btn-send-message" class="w-11 h-11 whatsapp-green text-[#111b21] rounded-full flex items-center justify-center shadow-md flex-shrink-0"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- FIREBASE AND SYSTEM CORE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAHazZpA2srlEclDKE0qWrDuj7-ULVWnLg",
          authDomain: "kausar-chat-hub.firebaseapp.com",
          projectId: "kausar-chat-hub",
          storageBucket: "kausar-chat-hub.firebasestorage.app",
          messagingSenderId: "543766591580",
          appId: "1:543766591580:web:fbbcdd538d3c403e5bce99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.activeUserPhone = localStorage.getItem('kausar_chat_session') || "";
        window.selectedTargetUser = "";
        let globalUnsubscribe = null;

        window.startPrivateSystem = async function() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('user-phone').innerText = window.activeUserPhone;
            
            try {
                await setDoc(doc(db, "registered_users", window.activeUserPhone), {
                    phone: window.activeUserPhone, name: "User", joinedAt: serverTimestamp()
                }, { merge: true });
            } catch(e) { console.log(e); }

            onSnapshot(collection(db, "registered_users"), (snapshot) => {
                const listContainer = document.getElementById('users-list-box');
                listContainer.innerHTML = "";
                snapshot.forEach((userDoc) => {
                    const targetPhone = userDoc.id;
                    if(targetPhone === window.activeUserPhone) return;
                    
                    const row = document.createElement('div');
                    row.className = `flex items-center gap-3 p-3.5 cursor-pointer hover:bg-[#202c33] border-b border-[#222e35] ${window.selectedTargetUser === targetPhone ? 'bg-[#2a3942]' : ''}`;
                    row.innerHTML = `<div class="w-10 h-10 bg-[#202c33] border border-gray-600 text-[#00a884] rounded-full flex items-center justify-center font-bold uppercase">${targetPhone.substring(7)}</div><div class="flex-1 min-w-0"><h4 class="font-medium text-white truncate">${targetPhone}</h4></div>`;
                    row.addEventListener('click', () => { window.openTargetChatWindow(targetPhone); });
                    listContainer.appendChild(row);
                });
            });
        };

        window.openTargetChatWindow = function(targetUserPhone) {
            window.selectedTargetUser = targetUserPhone;
            document.getElementById('sidebar-panel').classList.add('hidden', 'md:flex');
            document.getElementById('chat-panel').classList.replace('hidden', 'flex');
            document.getElementById('active-chat-title').innerText = targetUserPhone;
            document.getElementById('active-chat-avatar').innerText = targetUserPhone.substring(7);
            document.getElementById('input-bar-container').classList.replace('hidden', 'flex');

            if(globalUnsubscribe) globalUnsubscribe();
            globalUnsubscribe = onSnapshot(query(collection(db, "whatsapp_chats"), orderBy("timestamp", "asc")), (snapshot) => {
                const msgBox = document.getElementById('messages-box'); msgBox.innerHTML = "";
                snapshot.forEach((mDoc) => {
                    const data = mDoc.data();
                    if ((data.sender === window.activeUserPhone && data.receiver === window.selectedTargetUser) ||
                        (data.sender === window.selectedTargetUser && data.receiver === window.activeUserPhone)) {
                        const isMe = (data.sender === window.activeUserPhone);
                        const wrap = document.createElement('div');
                        wrap.className = `flex w-full mb-1 ${isMe ? 'justify-end' : 'justify-start'}`;
                        wrap.innerHTML = `<div class="max-w-[75%] rounded-lg pt-1.5 pb-4 pl-3 pr-8 shadow-sm relative min-w-[80px] ${isMe ? 'bg-[#005c4b] text-white rounded-tr-none' : 'bg-[#202c33] text-white rounded-tl-none'}"><p class="text-sm break-words">${data.message}</p><span class="text-[9px] text-gray-400 absolute bottom-0.5 right-1.5">${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}</span></div>`;
                        msgBox.appendChild(wrap);
                    }
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        };

        async function sendMsg() {
            const fld = document.getElementById('message-field'); const txt = fld.value.trim();
            if(!txt || !window.selectedTargetUser) return; fld.value = "";
            await addDoc(collection(db, "whatsapp_chats"), {
                sender: window.activeUserPhone, receiver: window.selectedTargetUser, message: txt, type: "text", timestamp: serverTimestamp()
            });
        }

        document.getElementById('btn-send-message').addEventListener('click', sendMsg);
        document.getElementById('message-field').addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMsg(); });
        document.getElementById('btn-logout').addEventListener('click', () => { localStorage.clear(); location.reload(); });
        document.getElementById('btn-close-chat').addEventListener('click', () => {
            document.getElementById('sidebar-panel').classList.remove('hidden');
            document.getElementById('chat-panel').classList.replace('flex', 'hidden');
            window.selectedTargetUser = ""; if(globalUnsubscribe) globalUnsubscribe();
        });

        if(window.activeUserPhone) { window.startPrivateSystem(); }
    </script>
</body>
    </html>
